<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="UTF-8">

    <title>Key Chaos | Slow Monday</title>
    
    <link rel="icon" type="image/png" href="../img/favicon.png">

<body>
    <header class="header">
        <div class="logo-container">
            <img src="../img/logo.png" alt="Slow Monday Logo" class="logo">

            <a>Key Chaos</a>
